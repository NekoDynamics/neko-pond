github:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - Docs/**

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "**/package.json"
          - "**/pnpm-lock.yaml"
          - "**/package-lock.json"
          - "**/yarn.lock"
          - "**/bun.lockb"

source:
  - changed-files:
      - any-glob-to-any-file:
          - App/**
          - Engine/**
          - AI/**
          - src/**
          - app/**
          - packages/**
