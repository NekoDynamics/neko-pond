name: Bug
description: Report a reproducible product or engineering issue.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed Behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Provide the smallest known reproduction.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: iPad model and iPadOS version
