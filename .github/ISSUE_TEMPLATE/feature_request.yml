name: Feature request
description: Propose a new capability or user-facing improvement.
title: "[Feature] "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Proposals should protect latency, frame stability, and native iPadOS quality.
  - type: textarea
    id: problem
    attributes:
      label: Problem / 问题
      description: What user, cat-facing, or engineering limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal / 方案
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area / 范围
      options:
        - App / SwiftUI
        - Engine / SpriteKit
        - Rendering / Metal
        - AI Behavior / CoreML
        - Touch Interaction
        - Assets / Audio
        - Documentation
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact / 影响
      description: Explain latency, FPS, memory, GPU, behavior, and iPad compatibility impact.
    validations:
      required: true
